name: Coverage Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run coverage tests
        run: bun run test:coverage

      - name: Ensure LCOV report exists
        run: |
          if [[ ! -f coverage/lcov.info ]]; then
            echo "coverage/lcov.info not generated by bun test --coverage." >&2
            exit 1
          fi

      - name: Resolve base/head SHAs
        id: shas
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "${GITHUB_OUTPUT}"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "base_sha=$(git rev-parse HEAD^)" >> "${GITHUB_OUTPUT}"
            echo "head_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          fi

      - name: Diff coverage gate (>= 80%)
        env:
          BASE_SHA: ${{ steps.shas.outputs.base_sha }}
          HEAD_SHA: ${{ steps.shas.outputs.head_sha }}
          LCOV_PATH: coverage/lcov.info
          DIFF_COVERAGE_REPORT: coverage/diff-coverage.md
          MIN_DIFF_COVERAGE: "80"
        run: bun scripts/ci/check-diff-coverage.mjs

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/diff-coverage.md
          if-no-files-found: ignore

      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- clawde-diff-coverage -->";
            let body = marker + "\nCoverage report not generated.";
            if (fs.existsSync("coverage/diff-coverage.md")) {
              body = fs.readFileSync("coverage/diff-coverage.md", "utf8");
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }
